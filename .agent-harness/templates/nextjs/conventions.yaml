# Next.js project conventions
# Edit for your project. Severity: error (blocks commit) | warning (advisory)

rules:
  - id: next-app-router-only
    scope: "**/*.{ts,tsx}"
    rule: "Use App Router (app/) — do not create pages/ directory routes"
    severity: error

  - id: next-server-components-default
    scope: "app/**/*.{ts,tsx}"
    rule: "Components are Server Components by default — add 'use client' only when browser APIs or hooks are needed"
    severity: warning

  - id: next-no-useeffect-data-fetch
    scope: "**/*.{ts,tsx}"
    rule: "Do not fetch data in useEffect — use Server Components or React Query"
    severity: error

  - id: next-image-component
    scope: "**/*.{ts,tsx}"
    rule: "Use next/image instead of <img> for all images"
    severity: warning

  - id: next-no-relative-imports-from-root
    scope: "**/*.{ts,tsx}"
    rule: "Use path aliases (@/components, @/lib) — no '../../../' relative imports beyond one level"
    severity: warning

  - id: next-env-prefix
    scope: "**/*.{ts,tsx}"
    rule: "Client-side env vars must be prefixed NEXT_PUBLIC_ — never expose server secrets to client"
    severity: error

  - id: next-no-default-export-in-lib
    scope: "src/lib/**/*.{ts,tsx}"
    rule: "Use named exports in lib/ — default exports only in page.tsx and layout.tsx"
    severity: warning

  - id: next-loading-error-boundaries
    scope: "app/**"
    rule: "Each route segment with async data must have a loading.tsx and error.tsx sibling"
    severity: warning
