# iOS/Swift project conventions
# Edit for your project. Severity: error (blocks commit) | warning (advisory)

rules:
  - id: swift-no-force-unwrap
    scope: "**/*.swift"
    rule: "Do not use force unwrap (!) — use guard let, if let, or ?? with a default"
    severity: error

  - id: swift-no-force-cast
    scope: "**/*.swift"
    rule: "Do not use force cast (as!) — use conditional cast (as?) with nil handling"
    severity: error

  - id: swift-main-thread-ui
    scope: "**/*.swift"
    rule: "All UIKit/SwiftUI updates must happen on the main thread — use @MainActor or DispatchQueue.main"
    severity: error

  - id: swift-no-global-state
    scope: "**/*.swift"
    rule: "Avoid global variables and singletons — prefer dependency injection"
    severity: warning

  - id: swift-prefer-structs
    scope: "**/*.swift"
    rule: "Prefer structs over classes for value types — use classes only when reference semantics are needed"
    severity: warning

  - id: swift-protocol-oriented
    scope: "**/*.swift"
    rule: "Define dependencies as protocols — concrete types injected at call site for testability"
    severity: warning

  - id: swift-async-await
    scope: "**/*.swift"
    rule: "Use async/await for asynchronous code — avoid GCD and completion handlers in new code"
    severity: warning

  - id: swift-test-naming
    scope: "**/*Tests.swift"
    rule: "Test methods must follow test_<unitUnderTest>_<condition>_<expectedResult> naming"
    severity: warning

  - id: swift-no-ui-in-viewmodel
    scope: "**/*ViewModel.swift"
    rule: "ViewModels must not import UIKit or SwiftUI — keep presentation logic framework-agnostic"
    severity: error

  - id: swift-accessibility
    scope: "**/*.swift"
    rule: "Interactive UI elements must have accessibilityLabel and accessibilityIdentifier set"
    severity: warning
